---
- name: Каталог Filebeat
  ansible.builtin.file:
    path: /opt/filebeat
    state: directory
    mode: "0755"

- name: Конфиг filebeat.yml
  ansible.builtin.template:
    src: filebeat.yml.j2
    dest: /opt/filebeat/filebeat.yml
    mode: "0644"

- name: docker-compose для Filebeat
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/filebeat/docker-compose.yml
    mode: "0644"

- name: Запустить Filebeat
  ansible.builtin.command: docker compose up -d
  args:
    chdir: /opt/filebeat
  register: fb_up
  changed_when: "'Started' in fb_up.stderr or 'Created' in fb_up.stderr"
