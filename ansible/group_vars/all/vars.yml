---
ansible_user: ubuntu

# Внутренние адреса сервисов (FQDN внутренней зоны Yandex Cloud)
zabbix_server_host: "zabbix.ru-central1.internal"
elastic_host: "elastic.ru-central1.internal"
elastic_port: 9200

# Версия стека Elastic (ES, Kibana, Filebeat - одинаковая)
elastic_version: "8.15.3"

# Zabbix
zabbix_version: "6.0"
zabbix_release_deb: "https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_6.0-4+ubuntu22.04_all.deb"

# Пароль БД Zabbix (из vault)
zabbix_db_password: "{{ vault_zabbix_db_password }}"
