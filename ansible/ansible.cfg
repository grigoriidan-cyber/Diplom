[defaults]
inventory            = inventory.ini
remote_user          = ubuntu
host_key_checking    = False
deprecation_warnings = False
retry_files_enabled  = False
interpreter_python   = auto_silent
roles_path           = roles

[ssh_connection]
pipelining = True
# Не падать на первом подключении к свежим ВМ
ssh_args = -o ConnectTimeout=20 -o ServerAliveInterval=30
